
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>S + S</title>

  <style>
    body {
      background-color: #f6f4f2;
      font-family: 'Georgia', serif;
      color: #333;
      padding: 30px;
    }

    .carta {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 50px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      line-height: 1.9;
      font-size: 18px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    audio {
      display: block;
      margin: 25px auto;
      width: 100%;
    }

    .texto {
      white-space: pre-line;
      text-align: justify;
    }

    .firma {
      text-align: right;
      margin-top: 50px;
      font-style: italic;
    }

    .boton-playlist {
      display: inline-block;
      background-color: #ff69b4; /* rosa brillante */
      color: #000; /* negro elegante */
      font-family: 'Georgia', serif;
      text-decoration: none;
      padding: 18px 35px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 20px;
      margin-top: 25px;
      transition: background 0.3s ease, transform 0.2s ease;
      text-align: center;
    }

    .boton-playlist:hover {
      background-color: #ff85c1;
      transform: scale(1.05);
    }

    .firma div {
      text-align: center;
      margin-top: 25px;
    }
  </style>
</head>

<body>
  <div class="carta">
    <h1>Para mi ., Saul.</h1>

    <audio controls>
      <source src="voz.m4a" type="audio/mp4">
    </audio>

    <div class="texto">
..

    <div class="firma">
      siempre .,<br>
      Sofia.<br>
      ༒
      <div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
